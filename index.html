
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#fff6f0,#f7e3d5);
      overflow-x: hidden;
    }

    h1,h2 { font-family: 'Great Vibes', cursive; margin: 0; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(rgba(255,245,236,0.85),rgba(243,213,192,0.9)),
                  url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e') center/cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .title {
      font-size: 1.8rem;
      color: #7b3f2f;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .names {
      font-size: 3.5rem;
      color: #7b3f2f;
      margin: 10px 0;
    }

    .invite-line {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .date {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #5a2d22;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #7b3f2f;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.05); }

    /* FLOWERS */
    .flower {
      position: absolute;
      width: 35px;
      opacity: 0.7;
      animation: floatUp 12s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-120vh); opacity: 0; }
    }

    /* SECTIONS */
    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    .card {
      max-width: 800px;
      margin: 20px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    img { width: 100%; display: block; }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 15px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <!-- FLOWERS -->
  <!-- <img src="https://pngimg.com/uploads/flower/flower_PNG102.png" class="flower" style="left:10%; animation-delay:0s;">
  <img src="https://pngimg.com/uploads/flower/flower_PNG102.png" class="flower" style="left:30%; animation-delay:2s;">
  <img src="https://pngimg.com/uploads/flower/flower_PNG102.png" class="flower" style="left:60%; animation-delay:4s;">
  <img src="https://pngimg.com/uploads/flower/flower_PNG102.png" class="flower" style="left:80%; animation-delay:1s;"> -->

  <!-- HERO -->
  <div class="hero">
    <div class="title">Wedding Invitation</div>
    <h1 class="names">Manavi & Bheem Reddy</h1>
    <div class="invite-line">We invite you to celebrate our wedding</div>
    <div class="date">April 19, 2026</div>
    <button class="btn" onclick="scrollToSection()">View Invitation</button>
  </div>

  <!-- CARDS (4 IMAGES) -->
  <div class="section">
    <h2>Invitation Card</h2>

    <div class="card">
      <img src="card-front.jpg" alt="Front">
    </div>

    <div class="card">
      <img src="card-inside.jpg" alt="Inside">
    </div>

    <div class="card">
      <img src="card-back.jpg" alt="Back">
    </div>

    <div class="card">
      <img src="card-extra.jpg" alt="Extra">
    </div>

  </div>

  <!-- MAP -->
  <div class="section">
    <h2>Venue Location 📍</h2>

    <iframe src="https://maps.google.com/maps?q=RW9V%2BP34+Shri+Basappa+Holkunde+Convention+Hall&z=15&output=embed"></iframe>

    <br>

    <a href="https://www.google.com/maps?q=RW9V%2BP34+Shri+Basappa+Holkunde+Convention+Hall" target="_blank">
      <button class="btn">Open in Google Maps 📍</button>
    </a>
  </div>

  <script>
    function scrollToSection() {
      window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
    }

    const cards = document.querySelectorAll('.card');

    window.addEventListener('scroll', () => {
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
          card.classList.add('show');
        }
      });
    });
  </script>

</body>
</html>
